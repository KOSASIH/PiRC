global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  # PiRC Services
  - job_name: 'pirc-ai-suite'
    static_configs:
      - targets: ['dashboard:8080', 'pi-gateway:3000', 'ops-dashboard:9090']
    metrics_path: /metrics
    scrape_interval: 10s
  
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: /metrics
  
  # Node Exporter (System metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']
  
  # Pi Network specific
  - job_name: 'pi-wallet'
    static_configs:
      - targets: ['pi-gateway:3000']
    metrics_path: /pi/metrics

alerting:
  alertmanagers:
    - static_configs:
        - targets:
