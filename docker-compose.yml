version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ai-agent:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - qdrant
    environment:
      - RUST_LOG=info
    volumes:
      - ./models:/app/models

volumes:
  qdrant_storage:
