version: '3.8'

name: pirc-ai-suite

x-base: &base
  restart: unless-stopped
  environment:
    - RUST_LOG=info
    - RUST_BACKTRACE=1
    - TZ=UTC

x-rust-builder: &rust-builder
  build:
    context: .
    dockerfile: Dockerfile.rust-builder

services:
  # 🧠 VECTOR DATABASE (Persistent AI Memory)
  qdrant:
    image: qdrant/qdrant:v1.10.1
    <<: *base
    ports:
      - "6333:6333"      # HTTP Dashboard
      - "6334:6334"      # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/collections || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # 🔴 REDIS (Rate Limiting + Cache)
  redis:
    image: redis:7.2-alpine
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

  # 📊 PYTHON FASTAPI DASHBOARD (Real-time Analytics)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.python-dashboard
    <<: *base
    ports:
      - "8080:8080"
      - "8443:8443"  # HTTPS
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
      - dashboard_db:/app/data
      - ./static:/app/static:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # 🤖 AI AGENT ORCHESTRATOR (Autonomous IRC Bots)
  ai-agent:
    <<: *rust-builder
    dockerfile: Dockerfile.ai-agent
    <<: *base
    ports:
      - "8081:8081"  # Health + Debug
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    volumes:
      - ./models:/app/models:ro
    environment:
      - RUST_LOG=info,pirc_ai_agent=debug
      - IRC_SERVER=irc.libera.chat:6667
      - IRC_NICK=PiAIBot
      - IRC_CHANNELS=#pirc-ai,#libera
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/1
      - PI_WALLET_ADDRESS=pi1qsuperagent1234567890abcdef
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # 💰 PI NETWORK GATEWAY (Wallet + Trading Bot)
  pi-gateway:
    <<: *rust-builder
    dockerfile: Dockerfile.pi-gateway
    <<: *base
    ports:
      - "3000:3000"
    volumes:
      - ./models:/app/models:ro
    environment:
      - RUST_LOG=info,pirc_pi_super=debug
      - REDIS_URL=redis://redis:6379/2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  # 🚀 OPS DASHBOARD (Rust-based Deployment Mgmt)
  ops-dashboard:
    <<: *rust-builder
    dockerfile: Dockerfile.ops
    <<: *base
    ports:
      - "9090:9090"
    environment:
      - RUST_LOG=info,pirc_ops=debug
      - QDRANT_URL=http://qdrant:6333
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 30s

  # 📈 PROMETHEUS (Full-stack Monitoring)
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--enable-feature=exemplar-storage'
    ports:
      - "9091:9090"
    <<: *base

  # 👁️ GRAFANA (Visual Monitoring + AI Dashboards)
  grafana:
    image: grafana/grafana:10.4.1
    user: "472:472"  # grafana user
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=PiRC2024!
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3001:3000"
    <<: *base
    depends_on:
      - prometheus

volumes:
  qdrant_storage:
  redis_data:
  dashboard_db:
  prometheus_data:
  grafana_storage:

networks:
  default:
    name: pirc-ai-net
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
