version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:v1.7.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 30s

  dashboard:
    build: 
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      - RUST_LOG=info,pirc_dashboard=debug
    volumes:
      - ./models:/app/models
      - ./pirc-dashboard/dashboard.db:/app/dashboard.db

  ai-agent:
    build: .
    depends_on:
      - qdrant
    environment:
      - RUST_LOG=info

volumes:
  qdrant_storage:
